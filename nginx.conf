server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve .jsx files with correct MIME type so Babel standalone can fetch them
    types {
        text/html                             html;
        text/css                              css;
        application/javascript                js jsx;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets, but not the entry point
    location ~* \.(css|jsx|js)$ {
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript text/javascript;
    gzip_min_length 256;
}
