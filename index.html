<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ACOE — Automation Center of Excellence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="i18n.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="page-home.jsx"></script>
  <script type="text/babel" src="page-showcase.jsx"></script>
  <script type="text/babel" src="page-hub.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const ROUTES = ['home', 'robotisation', 'digitalisation', 'reporting', 'hub'];

    function parseHash() {
      const h = (window.location.hash || '#/').replace(/^#\/?/, '').toLowerCase();
      if (!h) return 'home';
      const seg = h.split('/')[0];
      return ROUTES.includes(seg) ? seg : 'home';
    }

    function App() {
      const [route, setRoute]   = useState(parseHash());
      const [lang,  setLangRaw] = useState(() => localStorage.getItem('acoe-lang')  || 'en');
      const [theme, setThemeRaw] = useState(() => localStorage.getItem('acoe-theme') || 'light');

      // Keep window.__lang in sync so T() works outside React tree
      useEffect(() => {
        window.__lang = lang;
      }, [lang]);

      // Apply data-theme on <html> and persist
      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('acoe-theme', theme);
      }, [theme]);

      const setLang = (l) => {
        window.__lang = l;
        localStorage.setItem('acoe-lang', l);
        setLangRaw(l);
      };
      const setTheme = (t) => setThemeRaw(t);

      useEffect(() => {
        const onHash = () => {
          setRoute(parseHash());
          window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
        };
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      const navigate = (id) => {
        const target = id === 'home' ? '#/' : `#/${id}`;
        if (window.location.hash !== target) {
          window.location.hash = target;
        } else {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      };

      const pageProps = { onNavigate: navigate, lang };

      let Page = null;
      if (route === 'home')           Page = <Home           {...pageProps} />;
      else if (route === 'robotisation')   Page = <Robotisation   {...pageProps} />;
      else if (route === 'digitalisation') Page = <Digitalisation {...pageProps} />;
      else if (route === 'reporting')      Page = <Reporting      {...pageProps} />;
      else if (route === 'hub')            Page = <Hub            {...pageProps} />;

      return (
        <>
          <Navbar current={route} onNavigate={navigate} lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} />
          <main key={route}>{Page}</main>
          <Footer onNavigate={navigate} lang={lang} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
